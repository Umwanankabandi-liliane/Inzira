<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 420" fill="none" role="img" aria-label="Rwandan youth discovering opportunities">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E5FA3" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1A3A6B" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="hill1" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2E5FA3"/>
      <stop offset="1" stop-color="#1A3A6B"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#E8F4FD"/>
    </linearGradient>
  </defs>

  <rect width="560" height="420" fill="url(#sky)"/>

  <!-- Hills -->
  <path d="M0 300 C80 250 140 320 220 285 C300 250 380 310 560 270 L560 420 L0 420 Z" fill="url(#hill1)" opacity="0.55"/>
  <path d="M0 330 C100 300 180 350 280 320 C380 290 460 340 560 310 L560 420 L0 420 Z" fill="#16325C" opacity="0.7"/>

  <!-- Sun -->
  <circle cx="470" cy="72" r="36" fill="#90CAF9" opacity="0.35"/>

  <!-- Opportunity cards floating -->
  <g transform="translate(48 58)">
    <rect x="0" y="0" width="118" height="72" rx="14" fill="url(#card)" opacity="0.92"/>
    <rect x="14" y="16" width="44" height="8" rx="4" fill="#1A3A6B" opacity="0.85"/>
    <rect x="14" y="32" width="78" height="6" rx="3" fill="#94A3B8"/>
    <rect x="14" y="46" width="52" height="14" rx="7" fill="#E6F1FB"/>
    <text x="22" y="56" fill="#0C447C" font-family="Arial,sans-serif" font-size="9" font-weight="700">Scholarship</text>
  </g>

  <g transform="translate(390 42)">
    <rect x="0" y="0" width="108" height="68" rx="14" fill="url(#card)" opacity="0.88"/>
    <rect x="12" y="14" width="40" height="8" rx="4" fill="#166534" opacity="0.8"/>
    <rect x="12" y="30" width="70" height="6" rx="3" fill="#94A3B8"/>
    <rect x="12" y="44" width="48" height="14" rx="7" fill="#E8F5E9"/>
    <text x="20" y="54" fill="#166534" font-family="Arial,sans-serif" font-size="9" font-weight="700">Verified</text>
  </g>

  <!-- Main figure + device -->
  <g transform="translate(175 118)">
    <!-- Person -->
    <circle cx="105" cy="52" r="28" fill="#FFD8B0"/>
    <path d="M77 82 C77 82 88 74 105 74 C122 74 133 82 133 82 L133 118 C133 132 120 142 105 142 C90 142 77 132 77 118 Z" fill="#90CAF9"/>
    <path d="M68 118 C68 118 74 108 88 110 L88 170 L122 170 L122 110 C136 108 142 118 142 118 L142 178 C142 188 134 196 124 196 L86 196 C76 196 68 188 68 178 Z" fill="#2E5FA3"/>

    <!-- Laptop -->
    <rect x="150" y="128" width="120" height="78" rx="10" fill="#0F2749"/>
    <rect x="158" y="136" width="104" height="58" rx="6" fill="#E8F4FD"/>
    <rect x="168" y="148" width="56" height="6" rx="3" fill="#1A3A6B"/>
    <rect x="168" y="162" width="84" height="5" rx="2.5" fill="#94A3B8"/>
    <rect x="168" y="174" width="72" height="5" rx="2.5" fill="#94A3B8"/>
    <rect x="188" y="206" width="44" height="6" rx="3" fill="#64748B"/>
  </g>

  <!-- Trust badge -->
  <g transform="translate(72 250)">
    <rect width="132" height="54" rx="12" fill="#ffffff" opacity="0.14"/>
    <circle cx="28" cy="27" r="14" fill="#90CAF9" opacity="0.5"/>
    <path d="M22 27 L26 31 L35 22" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="50" y="24" fill="#fff" font-family="Arial,sans-serif" font-size="11" font-weight="700">AI-verified</text>
    <text x="50" y="40" fill="#B0BEC5" font-family="Arial,sans-serif" font-size="10">Trust score 0.95</text>
  </g>

  <!-- Kigali skyline hint -->
  <g opacity="0.45">
    <rect x="300" y="248" width="18" height="42" rx="2" fill="#90CAF9"/>
    <rect x="324" y="232" width="22" height="58" rx="2" fill="#90CAF9"/>
    <rect x="352" y="258" width="16" height="32" rx="2" fill="#90CAF9"/>
    <rect x="374" y="240" width="20" height="50" rx="2" fill="#90CAF9"/>
    <rect x="400" y="252" width="14" height="38" rx="2" fill="#90CAF9"/>
  </g>
</svg>
